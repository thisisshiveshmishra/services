<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />


<div class="container">
  <div class="card">
    <h3>Admin Login</h3>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <input type="text" formControlName="username" class="form-control" placeholder="Username" />
        <div *ngIf="submitted && f['username'].errors" class="text-danger">
          Username is required (min 4 chars)
        </div>
      </div>

      <div class="form-group">
<input [type]="passwordFieldType" formControlName="password" class="form-control" placeholder="Password" />
<i
  class="eye-icon"
  [class]="passwordFieldType === 'text' ? 'fa fa-eye' : 'fa fa-eye-slash'"
  (click)="togglePasswordVisibility()"
  style="
    position: absolute;
    right: 40px;
    top: 52%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 20px;
    color: rgb(29, 28, 28);
  "
></i>

        <div *ngIf="submitted && f['password'].errors" class="text-danger">
          Password is required (min 6 chars)
        </div>
      </div>

      <button type="submit">Login</button>

      <div class="text-center mt-3">
  <small>Don't have an account? <a routerLink="/adminregister">Register</a></small>
</div>

    </form>
  </div>
</div>
