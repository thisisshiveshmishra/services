<div class="container">
  <div class="content">
    <img
      src="./assets/serviceprovider 4.jpg"
      alt="header-image"
      class="cld-responsive"
    />
    <h1 class="form-title">Service Provider Login</h1>

    <form (submit)="onLogin(); $event.preventDefault();">
      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        placeholder="Email"
        required
      />
      <input
        type="password"
        [(ngModel)]="password"
        name="password"
        placeholder="Password"
        required
      />
      <button type="submit">Login</button>
    </form>

    <p *ngIf="message" style="color: red; text-align: center; margin-top: 10px;">
      {{ message }}
    </p>
  </div>
</div>
