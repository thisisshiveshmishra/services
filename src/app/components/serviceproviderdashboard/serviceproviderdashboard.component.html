

<!-- Logout Button -->
<div class="text-end my-3 me-4">
  <button (click)="logout()" class="btn btn-danger logout-button">Logout</button>
</div>

<form [formGroup]="editForm" (ngSubmit)="onSubmit()" enctype="multipart/form-data">
  <div class="container">
    <div class="row gutters">
      
      <!-- Profile Card Left -->
      <div class="col-xl-3 col-lg-3 col-md-12 col-sm-12 col-12">
        <div class="card h-100">
          <div class="card-body">
            <div class="account-settings">
              <div class="user-profile">
                <div class="user-avatar">
                 <img [src]="profileImageUrl" (error)="profileImageUrl='https://bootdey.com/img/Content/avatar/avatar7.png'" 
     alt="Profile Picture" class="img-fluid rounded-circle"
     style="width: 300px; height: 300px; object-fit: cover;">


     <!-- <img *ngIf="provider.profilePicture" [src]="'data:image/jpeg;base64,' + provider.profilePicture" width="60" height="60" /> -->

                </div>
                <h5 class="user-name">{{ editForm.value.firstName }} {{ editForm.value.lastName }}</h5>
                <h6 class="user-email">{{ editForm.value.email }}</h6>
              </div>
              <!-- <div class="about">
                <h5>About</h5>
                <p>This is your editable profile. Update your info below.</p>
              </div> -->
            </div>
          </div>
        </div>
      </div>

      <!-- Form Right -->
      <div class="col-xl-9 col-lg-9 col-md-12 col-sm-12 col-12">
        <div class="card h-100">
          <div class="card-body">
            <!-- Personal Details -->
            <div class="row gutters">
              <div class="col-xl-12">
                <h6 class="mb-2 text-primary">Personal Details</h6>
              </div>

              <div class="col-md-6">
                <div class="form-group">
                  <label>First Name</label>
                  <input type="text" formControlName="firstName" class="form-control" placeholder="Enter First Name">
                </div>
              </div>

              <div class="col-md-6">
                <div class="form-group">
                  <label>Last Name</label>
                  <input type="text" formControlName="lastName" class="form-control" placeholder="Enter Last Name">
                </div>
              </div>

              <div class="col-md-6">
                <div class="form-group">
                  <label>Email</label>
                  <input type="email" formControlName="email" class="form-control" placeholder="Enter Email">
                </div>
              </div>

              <div class="col-md-6">
                <div class="form-group">
                  <label>Mobile Number</label>
                  <input type="text" formControlName="mobileNumber" class="form-control" placeholder="Enter Mobile">
                </div>
              </div>

              <div class="col-md-6">
                <div class="form-group">
                  <label>Location</label>
                  <input type="text" formControlName="location" class="form-control" placeholder="Enter Location">
                </div>
              </div>

              <div class="col-md-6">
                <div class="form-group">
                  <label>Gender</label>
                  <select class="form-control" formControlName="gender">
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                  </select>
                </div>
              </div>


<div class="col-md-6">
  <div class="form-group">
    <label>Category</label>
    <input type="text" class="form-control" formControlName="category" placeholder="Enter Category" />
  </div>
</div>


              <div class="col-md-6">
                <div class="form-group">
                  <label>Upload Profile Picture</label>
                  <input type="file" (change)="onFileChange($event)" class="form-control">
                </div>
              </div>
            </div>

          

            <!-- Buttons -->
            <div class="row gutters mt-3">
              <div class="col-xl-12 text-right">
                <button type="button" class="btn btn-secondary">Cancel</button>
                <button type="submit" class="btn btn-primary">Update</button>
              </div>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</form>


<!-- Service Provider Images Section -->
<div class="service-images-section">

  <h6>Upload Service Images</h6>
  <input
    type="file"
    class="form-control"
    (change)="onMultipleFilesSelected($event)"
    multiple
  />

  <!-- Preview of selected images -->
  <div class="image-preview-container mt-3">
    <div class="image-preview" *ngFor="let preview of selectedImagePreviews">
      <img [src]="preview" />
    </div>
  </div>

  <!-- Uploaded Images Section -->
  <h6 class="mt-4">Uploaded Images</h6>
  <div class="uploaded-images-container">
    <div class="image-container" *ngFor="let img of uploadedImages">
      <img [src]="'data:image/jpeg;base64,' + img" />
    </div>
  </div>

  <!-- Upload Button -->
  <button
    class="upload-btn mt-3"
    (click)="uploadImages()"
    [disabled]="!selectedImages.length"
  >
    Upload Images
  </button>
</div>
