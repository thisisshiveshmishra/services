<div class="container mt-5">
  <div class="card shadow p-4 mx-auto" style="max-width: 400px;">
    <h3 class="text-center mb-4">Admin Registration</h3>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <!-- Username -->
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input id="username" formControlName="username" class="form-control" placeholder="Enter username" />
        <div class="text-danger" *ngIf="submitted && f['username']?.errors">
          <small *ngIf="f['username']?.errors?.['required']">Username is required.</small>
          <small *ngIf="f['username']?.errors?.['minlength']">Minimum 4 characters.</small>
        </div>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input id="password" type="password" formControlName="password" class="form-control" placeholder="Enter password" />
        <div class="text-danger" *ngIf="submitted && f['password']?.errors">
          <small *ngIf="f['password']?.errors?.['required']">Password is required.</small>
          <small *ngIf="f['password']?.errors?.['minlength']">Minimum 6 characters.</small>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary w-100">Register</button>

      <div class="text-center mt-3">
  <small>Already have an account? <a routerLink="/adminlogin">Login</a></small>
</div>

    </form>
  </div>
</div>
